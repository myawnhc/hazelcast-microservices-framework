# Docker Compose DEMO mode overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose-demo.yml up -d
#
# Priorities: stability over data integrity, run all day without crashing
# Total memory: ~6GB (fits on 16GB laptop)
#
# - Jaeger disabled (no tracing)
# - PostgreSQL enabled (persistence + SQL queryable data)
# - Aggressive eviction to keep memory bounded
# - G1GC tuned for short pause times

services:
  # Disable Jaeger in demo mode — no tracing needed
  jaeger:
    profiles: ["never"]

  account-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,demo
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport
      - TRACING_ENABLED=false
      - OTEL_LOG_LEVEL=ERROR
    deploy:
      resources:
        limits:
          memory: 768M

  inventory-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,demo
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport
      - TRACING_ENABLED=false
      - OTEL_LOG_LEVEL=ERROR
    deploy:
      resources:
        limits:
          memory: 768M

  order-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,demo
      - JAVA_OPTS=-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport
      - TRACING_ENABLED=false
      - OTEL_LOG_LEVEL=ERROR
    deploy:
      resources:
        limits:
          memory: 1024M

  payment-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,demo
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport
      - TRACING_ENABLED=false
      - OTEL_LOG_LEVEL=ERROR
    deploy:
      resources:
        limits:
          memory: 768M

  api-gateway:
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:+UseContainerSupport
    deploy:
      resources:
        limits:
          memory: 384M

  management-center:
    environment:
      - JAVA_OPTS=-Xmx512m
    deploy:
      resources:
        limits:
          memory: 768M
