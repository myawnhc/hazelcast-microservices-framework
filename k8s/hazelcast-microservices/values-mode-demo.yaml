# DEMO mode values overlay
# Usage: helm upgrade --install demo . -f values.yaml -f values-mode-demo.yaml
#
# Priorities: stability over data integrity, run all day at a trade show
# - No PostgreSQL persistence
# - No tracing (Jaeger not started)
# - Aggressive IMap eviction
# - Lower memory footprint

account-service:
  spring:
    profiles: "kubernetes,demo"
  persistence:
    enabled: false
  jvm:
    xms: "256m"
    xmx: "512m"
    opts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseContainerSupport"
  resources:
    requests:
      memory: "384Mi"
      cpu: "250m"
    limits:
      memory: "768Mi"
      cpu: "1000m"

