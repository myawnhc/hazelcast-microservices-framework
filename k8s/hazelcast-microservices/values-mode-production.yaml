# PRODUCTION mode values overlay
# Usage: helm upgrade --install demo . -f values.yaml -f values-mode-production.yaml
#
# Priorities: zero data loss, high availability
# - PostgreSQL persistence with write-behind
# - Full monitoring and tracing
# - Higher memory for sustained throughput

account-service:
  spring:
    profiles: "kubernetes,production"
  persistence:
    enabled: true
  jvm:
    xms: "512m"
    xmx: "1024m"
    opts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=4m -XX:+UseContainerSupport"
  resources:
    requests:
      memory: "768Mi"
      cpu: "500m"
    limits:
      memory: "1536Mi"
      cpu: "2000m"

